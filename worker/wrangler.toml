# TREK API on Cloudflare Workers.
#
# Two deploy environments live in this file:
#   - dev  → deployed from the `dev` git branch by .github/workflows/deploy-dev.yml
#   - prod → deployed from `main` by .github/workflows/deploy-prod.yml
#
# Each environment uses its own Worker name, D1 database, and R2 bucket so
# the dev backend can never corrupt prod data.
#
# Local development uses the top-level (no [env]) config below, which points
# at the dev resources. Run `npm run dev` (= `wrangler dev`) to start it.

name = "trek-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built React/Vite client (../client/dist) from the same Worker.
# Any request that doesn't match an /api or /ws route falls through to assets,
# and the SPA fallback rewrites unknown paths to index.html for React Router.
[assets]
directory = "../client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = false

[observability]
enabled = true

# -----------------------------------------------------------------------------
# Top-level bindings = local `wrangler dev` defaults. CI never deploys this
# block (workflows always pass `--env dev` or `--env prod`).
# -----------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "trek-db"
database_id = "e1a7ce42-497e-4abb-a9a1-a2c781c0c079"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "trek-uploads"

[[durable_objects.bindings]]
name = "TRIP_ROOM"
class_name = "TripRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TripRoom"]

[vars]
APP_NAME = "TREK"
JWT_ISSUER = "trek-api"
APP_ENV = "local"

[triggers]
crons = [
  "*/15 * * * *",
  "0 * * * *",
  "0 8 * * *",
]

# -----------------------------------------------------------------------------
# Dev environment — deployed on every push to `dev`.
# Resources are isolated from prod.
# -----------------------------------------------------------------------------
[env.dev]
name = "trek-api-dev"

[env.dev.assets]
directory = "../client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = false

[env.dev.observability]
enabled = true

[[env.dev.d1_databases]]
binding = "DB"
database_name = "trek-db-dev"
database_id = "5b62d65e-e38a-4bd7-a213-0eb5503ce06c"

[[env.dev.r2_buckets]]
binding = "UPLOADS"
bucket_name = "trek-uploads-dev"

[[env.dev.durable_objects.bindings]]
name = "TRIP_ROOM"
class_name = "TripRoom"

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["TripRoom"]

[env.dev.vars]
APP_NAME = "TREK"
JWT_ISSUER = "trek-api"
APP_ENV = "dev"

[env.dev.triggers]
crons = [
  "*/15 * * * *",
  "0 * * * *",
  "0 8 * * *",
]

# -----------------------------------------------------------------------------
# Prod environment — deployed on every push to `main`.
# -----------------------------------------------------------------------------
[env.prod]
name = "trek-api"

[env.prod.assets]
directory = "../client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = false

[env.prod.observability]
enabled = true

[[env.prod.d1_databases]]
binding = "DB"
database_name = "trek-db"
database_id = "e1a7ce42-497e-4abb-a9a1-a2c781c0c079"

[[env.prod.r2_buckets]]
binding = "UPLOADS"
bucket_name = "trek-uploads"

[[env.prod.durable_objects.bindings]]
name = "TRIP_ROOM"
class_name = "TripRoom"

[[env.prod.migrations]]
tag = "v1"
new_sqlite_classes = ["TripRoom"]

[env.prod.vars]
APP_NAME = "TREK"
JWT_ISSUER = "trek-api"
APP_ENV = "prod"

[env.prod.triggers]
crons = [
  "*/15 * * * *",
  "0 * * * *",
  "0 8 * * *",
]
